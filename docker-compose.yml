services:
  postgres:
    image: postgres:latest
    container_name: phinuxtv_postgres
    environment:
      POSTGRES_USER: phinux
      POSTGRES_PASSWORD: phinux
      POSTGRES_DB: phinuxtv
    ports:
      - "5432:5432"
    volumes:
      - phinuxtv_postgres:/var/lib/postgresql
    restart: on-failure

  redis_cache:
    image: redis:latest
    container_name: redis_local
    ports:
      - "6379:6379"
    volumes:
      - cache_redis:/var/lib/redis/data
    restart: on-failure

volumes:
  phinuxtv_postgres:
  cache_redis:

networks:
  default:
    driver: bridge
